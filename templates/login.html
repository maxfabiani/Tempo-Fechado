<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | Tempo Fechado</title>
  <link rel="stylesheet" href="/static/style.css" />
  <link rel="icon" type="image/png" href="/static/tempo_fechado_favicon_v1.png" />
</head>
<body class="login-body">
  <div class="login-card">
    <div class="login-brand">
      <img src="/static/tempo_fechado_mascote_banner.png" alt="Identidade Tempo Fechado" class="login-brand-banner" />
      <div class="login-brand-copy">
        <h1>Tempo Fechado</h1>
        <p>Conformidade e Gestão de Jornada</p>
      </div>
    </div>

    {% if erro %}
      <div class="login-error">{{ erro }}</div>
    {% endif %}

    <form method="POST" class="login-form">
      <label>Usuário</label>
      <input name="usuario" autocomplete="username" required />

      <label>Senha</label>
      <input name="senha" type="password" autocomplete="current-password" required />

      <button class="btn" type="submit">Entrar</button>
    </form>

    <div class="login-hint">
      Acesso por perfil: <strong>Administrador</strong> libera importação e envio de alertas; <strong>Consulta</strong> visualiza os painéis.
      Após o primeiro acesso, troque as senhas pela interface de Administração ou pelo botão <code>Minha senha</code>.
    </div>
  </div>
</body>
</html>
